name: CI Security

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_DIR: terraform
  IMAGE_TO_SCAN: grafana/grafana:latest

jobs:
  terraform:
    name: Terraform fmt / init / validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    needs: terraform

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          cache: true

      - name: TFLint init
        run: tflint --init

      - name: TFLint scan
        run: tflint --recursive

  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    needs: tflint

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          # Results are generated only on a success or failure
          # this is required since GitHub by default won't run the next step
          # when the previous one has failed. Security checks that do not pass will 'fail'.
          # An alternative is to add `continue-on-error: true` to the previous step
          # Or 'soft_fail: true' to checkov.
          soft_fail: false

      - name: Upload SARIF file
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: checkov

    permissions:
      contents: read
      security-events: write
      actions: read

    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Perform Semgrep Analysis
        run: |
          semgrep scan -q --sarif --config auto . > semgrep-results.sarif

      - name: Save SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-scan-results
          path: semgrep-results.sarif

      - name: Upload SARIF result to the GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif

  trivy:
    name: Trivy CVE scan
    runs-on: ubuntu-latest
    needs: semgrep

    steps:
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_TO_SCAN }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          scan-type: 'os,library'
          severity: HIGH,CRITICAL
          
          
          