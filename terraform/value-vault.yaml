global:
  enabled: true
  tlsDisable: true

server:
  enabled: true

  dev:
    enabled: false

  standalone:
    enabled: false

  ha:
    enabled: true
    replicas: 1

    raft:
      enabled: true
      setNodeId: true

      config: |
        ui = true

        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_disable = 1

          telemetry {
            unauthenticated_metrics_access = true
          }
        }

        storage "raft" {
          path = "/vault/data"
        }

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }

        service_registration "kubernetes" {}

  dataStorage:
    enabled: true
    size: 5Gi
    mountPath: "/vault/data"
    accessMode: ReadWriteOnce

  auditStorage:
    enabled: true
    size: 1Gi
    mountPath: "/vault/audit"
    accessMode: ReadWriteOnce

injector:
  enabled: true

ui:
  enabled: true
  serviceType: ClusterIP
  externalPort: 8200